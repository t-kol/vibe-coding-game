// ============================================================
// [CONFIG]
// ============================================================
const CONFIG = {
  // Engine
  torque:           0.26,
  brakeForce:       0.55,
  maxSpeed:         5.5,
  reverseMaxSpeed:  4.5,

  // Steering (front wheel angle)
  // Steady-state steerAngle while holding = steerSpeed / (1 - steerReturn)
  // 0.062 / (1 - 0.88) = 0.062 / 0.12 = 0.52 rad → clamped to maxSteer (0.44) = full lock ✓
  maxSteer:         0.44,   // max front wheel lock (radians ~25°)
  steerSpeed:       0.062,  // how fast steering angle builds
  steerReturn:      0.88,   // high value so key-hold reaches full lock naturally

  // Yaw (rotational physics)
  // targetYaw at full lock + full speed: 0.44 * 1.0 * 0.072 = 0.0317 rad/frame ≈ 110°/sec
  steerYawFactor:   0.072,
  yawLerp:          0.26,
  oversteerFactor:  0.024,  // rear slip → extra yaw/frame — faster spinout buildup

  // Grip — NOTE: in this physics model, HIGHER grip = more steady-state slip.
  // lat *= grip each frame preserves lateral velocity; velocity then lags behind heading → slip.
  // grip=0: velocity instantly aligns with heading (no slip).
  // grip=0.86: steady-state slip at full lock+speed = 0.0317/0.14 ≈ 0.23 rad (comfortable oversteer).
  // grip=0.95: handbrake entry = 0.0317/0.05 ≈ 0.63 rad slip (aggressive slide).
  gripRear:         0.95,   // rear steps out more readily at speed
  gripDrift:        0.98,   // once drifting, slide deepens and sustains more
  handbrakeGrip:    0.95,   // handbrake = very aggressive slide entry
  driftThreshold:   0.08,   // lower threshold — drift state triggers sooner

  // Surface friction
  offTrackFriction: 0.90,
  onTrackFriction:  0.992,

  // Scoring
  scorePerFrame:    0.5,
  angleMultiplier:  80,
  comboWindow:      90,
  maxCombo:         8,
};

const TILE_SIZE = 64;

// ============================================================
// [STATE]

  score:       0,
  combo:       1,

  drifting:    false,

};

// ── Donut smoke ──────────────────────────────────────────────────────────────
// Tracks accumulated yaw while continuously drifting forward.
// After 3 full circles (6π rad) smoke particles are emitted at the car's world
// position. Particles fade slowly while drifting, rapidly once drifting stops.
const THREE_CIRCLES = 2 * Math.PI * 2; // ~12.57 rad
const smokeState = {
  driftRotation: 0,   // resets to 0 the moment drifting stops
  particles:     [],
};
const MAX_SMOKE = 120;

function updateSmoke() {
  const fwd = car.vx * Math.cos(car.heading) + car.vy * Math.sin(car.heading);
  const activeDrift = car.drifting && fwd > 0;

  if (activeDrift) {
    smokeState.driftRotation += Math.abs(car.yawRate);
  } else {
    smokeState.driftRotation = 0; // must be continuous — reset on any break
  }

  const triggered = smokeState.driftRotation >= THREE_CIRCLES;

  // Emit particles while triggered + actively drifting
  if (triggered && activeDrift) {
    // Emit 3 puffs per frame, offset around car
    for (let i = 0; i < 3; i++) {
      const angle  = Math.random() * Math.PI * 2;
      const spread = 20 + Math.random() * 25;
      smokeState.particles.push({
        x:      car.x + Math.cos(angle) * spread,
        y:      car.y + Math.sin(angle) * spread,
        radius: 28 + Math.random() * 32,
        alpha:  0.28 + Math.random() * 0.18,
        vx:     (Math.random() - 0.5) * 0.4,
        vy:     (Math.random() - 0.5) * 0.4,
        active: true,  // will be set false when drifting stops
      });
    }
  }

  // Mark existing particles as no longer fed when drift breaks
  if (!activeDrift) {
    for (const p of smokeState.particles) p.active = false;
  }

  // Age all particles
  for (let i = smokeState.particles.length - 1; i >= 0; i--) {
    const p = smokeState.particles[i];
    p.x      += p.vx;
    p.y      += p.vy;
    p.radius += 0.6;
    p.alpha  -= p.active ? 0.0012 : 0.022; // slow fade while drifting, fast after
    if (p.alpha <= 0) smokeState.particles.splice(i, 1);
  }
}

function drawSmoke() {
  if (smokeState.particles.length === 0) return;

  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;

  ctx.save();
  for (const p of smokeState.particles) {
    const sx = p.x - camera.x + halfW;
    const sy = p.y - camera.y + halfH;
    if (sx < -p.radius || sx > canvas.width  + p.radius ||
        sy < -p.radius || sy > canvas.height + p.radius) continue;

    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, p.radius);
    g.addColorStop(0,   `rgba(160,160,160,${p.alpha.toFixed(3)})`);
    g.addColorStop(0.5, `rgba(130,130,130,${(p.alpha * 0.6).toFixed(3)})`);
    g.addColorStop(1,   `rgba(110,110,110,0)`);
    ctx.beginPath();
    ctx.arc(sx, sy, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
  }
  ctx.restore();
}

// Soccer ball — sits at center of Caniglia Field, can be knocked by the car

  const TS = TILE_SIZE;
  soccerBall.x  = ((SOCCER_FIELD.fx1 + SOCCER_FIELD.fx2) / 2) * TS;
  soccerBall.y  = ((SOCCER_FIELD.fy1 + SOCCER_FIELD.fy2) / 2) * TS;
  soccerBall.vx = 0;
  soccerBall.vy = 0;
}

// Tile IDs
const T = {
  VOID:         0,
  ASPHALT:      1,
  INTERSECTION: 2,
  SIDEWALK:     3,
  GRASS:        4,
  DIRT:         5,
  PARKING:      6,
  BUILDING:     7,
  TREE:         8,
  CURB:         10,
};

const TILE_COLLIDABLE = {
  0: true, 1: false, 2: false, 3: false, 4: false,
  5: false, 6: false, 7: true, 8: true, 10: true,
};

const TILE_FRICTION = {
  0: 0.85, 1: 0.995, 2: 0.995, 3: 0.97, 4: 0.94,
  5: 0.96, 6: 0.99, 7: 0.85, 8: 0.85, 10: 0.85,
};

let MAP = null; // set by buildPlaceholderMap()

// support multiple maps and switching

let MAP_BUILDERS = null;    // populated in init()
let CURRENT_MAP_NAME = ''; // descriptive string for HUD

// UNO Campus map — based on satellite photo annotation
// Blue highlights → ASPHALT roads (outer circuit perimeter)
// Red squares     → BUILDING (collidable)
// Yellow squares  → PARKING lots
// Everything else → GRASS green space
//
// Tile coordinate mapping (140×100 grid):
//   Top road (Dodge St):        y ≈ 3
//   Left road (S 67th Ave):     x ≈ 12
//   Internal upper H-road:      y ≈ 40
//   Internal lower H-road:      y ≈ 57
//   Internal vertical road:     x ≈ 57
//   Right road (Univ Dr E):     x ≈ 127
function buildUNOCampusMap() {
  const W = 140, H = 100;
  const tiles     = new Array(W * H).fill(T.GRASS);
  const collision = new Array(W * H).fill(false);
  const markings  = new Array(W * H).fill(false);

  function idx(x, y) { return y * W + x; }

  function fillRect(x, y, w, h, tileId) {
    for (let dy = 0; dy < h; dy++) {
      for (let dx = 0; dx < w; dx++) {
        const tx = x + dx, ty = y + dy;
        if (tx >= 0 && tx < W && ty >= 0 && ty < H) {
          tiles[idx(tx, ty)] = tileId;
        }
      }
    }
  }

  function drawHRoad(x, y, len, roadWidth) {
    fillRect(x, y - 1, len, 1, T.SIDEWALK);
    fillRect(x, y + roadWidth, len, 1, T.SIDEWALK);
    fillRect(x, y, len, roadWidth, T.ASPHALT);
    if (roadWidth >= 2) {
      const cy = y + Math.floor(roadWidth / 2);
      for (let mx = x; mx < x + len; mx++) markings[idx(mx, cy)] |= 1; // bit 1 = H dash
    }
  }

  function drawVRoad(x, y, len, roadWidth) {
    fillRect(x - 1, y, 1, len, T.SIDEWALK);
    fillRect(x + roadWidth, y, 1, len, T.SIDEWALK);
    fillRect(x, y, roadWidth, len, T.ASPHALT);
    if (roadWidth >= 2) {
      const cx = x + Math.floor(roadWidth / 2);
      for (let my = y; my < y + len; my++) markings[idx(cx, my)] |= 2; // bit 2 = V dash
    }
  }

  // Capsule rasteriser: paints every tile whose centre lies within
  // (width/2) units of the line segment.  Gap-free on any angle.
  function drawSegment(x1, y1, x2, y2, tileId, width) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return;
    const half = width / 2;
    const halfSq = half * half;
    const minTX = Math.max(0,     Math.floor(Math.min(x1, x2) - half));
    const maxTX = Math.min(W - 1, Math.ceil (Math.max(x1, x2) + half));
    const minTY = Math.max(0,     Math.floor(Math.min(y1, y2) - half));
    const maxTY = Math.min(H - 1, Math.ceil (Math.max(y1, y2) + half));
    for (let ty = minTY; ty <= maxTY; ty++) {
      for (let tx = minTX; tx <= maxTX; tx++) {
        const cx = tx + 0.5 - x1, cy = ty + 0.5 - y1;
        const t  = Math.max(0, Math.min(1, (cx * dx + cy * dy) / lenSq));
        const nx = cx - t * dx, ny = cy - t * dy;
        if (nx * nx + ny * ny <= halfSq) tiles[idx(tx, ty)] = tileId;
      }
    }
  }

  // ── Tree clusters (drawn first; roads overwrite) ──────────────────────────
  // West campus / Maverick Village dorm area
  const campusTrees = [
    [2,12],[4,20],[2,30],[4,38],[2,48],[3,57],[5,65],
    [22,55],[25,60],[20,65],[28,62],[23,70],
    [8,44],[11,50],[7,56],
  ];
  for (const [tx, ty] of campusTrees) fillRect(tx, ty, 2, 2, T.TREE);

  // Elmwood Park southern green space
  const parkTrees = [
    [20,78],[28,75],[36,80],[44,76],[52,79],[60,75],
    [30,87],[42,90],[55,86],[70,83],[82,80],[95,75],
    [108,76],[118,79],[125,74],[120,85],
  ];
  for (const [tx, ty] of parkTrees) fillRect(tx, ty, 2, 2, T.TREE);

  // ── Parking lots (blue in sketch — 3 areas on far-left side) ──────────────
  fillRect(5,  7, 22, 16, T.PARKING);  // upper-left parking
  fillRect(20, 26, 17, 13, T.PARKING); // middle-left parking
  fillRect(20, 44, 17, 11, T.PARKING); // lower-left parking (below upper H-road)

  // H&K inner-L parking lot — fills the open corner between the two building arms
  fillRect(73, 44, 20, 18, T.PARKING); // x=73–92, y=44–61

  // ── Roads (blue circuit highlights) ──────────────────────────────────────

  // Top road: Dodge St / S University Dr Rd N — full width east–west (width 3 = odd, center at y=4)
  drawHRoad(0, 3, W, 3);

  // Left road: S 67th Ave — north–south (width 3 = odd, center at x=13)
  drawVRoad(12, 6, 44, 3);

  // Left road curves south through Maverick Village
  drawSegment(13, 50, 18, 62, T.ASPHALT, 3);
  drawSegment(18, 62, 24, 72, T.ASPHALT, 4);

  // University Dr S — southwest leg curving toward Elmwood Park
  drawSegment(24, 72, 40, 84, T.ASPHALT, 4);
  drawSegment(40, 84, 58, 91, T.ASPHALT, 4);
  drawSegment(58, 91, 76, 95, T.ASPHALT, 4);

  // Right road: University Dr E — north–south along eastern edge (width 5 = odd, center at x=129)
  drawVRoad(127, 6, 62, 5);

  // University Dr E curves southeast into Elmwood Park
  // Curve stays east of Caniglia Field (x≥122 until y=82)
  drawSegment(129, 68, 125, 82, T.ASPHALT, 5);
  drawSegment(125, 82, 107, 91, T.ASPHALT, 6);
  drawSegment(107, 91, 76, 95, T.ASPHALT, 6);

  // Junction patches where straight roads blend into curves
  fillRect(10, 47, 10, 6, T.ASPHALT);   // left road → southwest curve
  fillRect(125, 65, 10, 6, T.ASPHALT);  // right road → southeast curve

  // Internal campus vertical road — runs from top road down to upper H-road only
  drawVRoad(57, 6, 35, 3);

  // Internal campus horizontal road — upper cross-road (University Dr S, y≈40)
  drawHRoad(12, 40, 48, 3);   // western leg: left road to vertical road
  drawHRoad(57, 40, 76, 3);   // eastern leg: vertical road to right road

  // ── Buildings (red in sketch, collidable) ─────────────────────────────────
  // Key from sketch: Red=buildings, Blue=parking, White=roads, Green=soccer field

  // North row — 6 buildings spread across campus (above upper H-road at y=40)
  // Two buildings WEST of vertical road (replacing old parking in that zone)
  fillRect(33,  8, 10, 11, T.BUILDING); // NW building A  (x=33–42)
  fillRect(45,  8, 11, 11, T.BUILDING); // NW building B  (x=45–55)
  // Four buildings EAST of vertical road
  fillRect(61,  8,  9, 11, T.BUILDING); // Criss Library  (x=61–69)
  fillRect(72,  8, 12, 11, T.BUILDING); // Milo Bail Student Center  (x=72–83)
  fillRect(96,  8, 13, 11, T.BUILDING); // Durham Science Center  (x=96–108)
  fillRect(113, 8, 12, 13, T.BUILDING); // Engineering Hall  (x=113–124, clear of right road sidewalk at x=126)

  // H&K / Wellness Center — L-shaped, clear of all roads
  // Starts at x=61 (1 tile past vertical road sidewalk at x=60), y=44 (1 tile past upper H-road sidewalk at y=43)
  fillRect(61, 44, 12, 29, T.BUILDING); // vertical part of L  (x=61–72, y=44–72)
  fillRect(73, 62, 20, 11, T.BUILDING); // horizontal foot of L (x=73–92, y=62–72)

  // Soccer field (GREEN box in sketch) — Caniglia Field
  // Left as open GRASS (no collidable tiles); labels still trigger by proximity

  // East campus — 2 buildings right of soccer field (~x=96–104)
  fillRect(109, 44, 13, 14, T.BUILDING); // east building A  (x=109–121, y=44–57, south of H-road)
  fillRect(110, 60, 13, 12, T.BUILDING); // east building B  (x=110–122, y=60–71, clear of right road)

  // Maverick Village Clubhouse — west campus
  fillRect(23, 44, 8, 5, T.BUILDING);

  // ── Void border ──────────────────────────────────────────────────────────
  for (let x = 0; x < W; x++) {
    tiles[idx(x, 0)]     = T.VOID;
    tiles[idx(x, H - 1)] = T.VOID;
  }
  for (let y = 0; y < H; y++) {
    tiles[idx(0, y)]     = T.VOID;
    tiles[idx(W - 1, y)] = T.VOID;
  }

  // ── Build collision ───────────────────────────────────────────────────────
  for (let i = 0; i < W * H; i++) {
    collision[i] = TILE_COLLIDABLE[tiles[i]] === true;
  }

  // Parking lot areas (world pixels) — used by drawParkingLotStalls()
  const TS = TILE_SIZE;
  const parkingLots = [
    // upper-left parking split by left road (x=12–14) + sidewalks (x=11,15)
    { x:  5*TS, y:  7*TS, w:  6*TS, h: 16*TS },  // upper-left west half  (tiles x=5–10)
    { x: 16*TS, y:  7*TS, w: 11*TS, h: 16*TS },  // upper-left east half  (tiles x=16–26)
    { x: 20*TS, y: 26*TS, w: 17*TS, h: 13*TS },  // middle-left
    { x: 20*TS, y: 44*TS, w: 17*TS, h: 11*TS },  // lower-left
    { x: 73*TS, y: 44*TS, w: 20*TS, h: 18*TS },  // H&K inner-L
  ];

  return { tiles, collision, markings, width: W, height: H, parkingLots };
}

// ── Tileset (procedural, offscreen canvas) ──────────────────────────────────
let tilesetCanvas = null;
let tilesetImage  = null;

const TILEMAP = {
  0:  { sx: 0,   sy: 0   },  // VOID
  1:  { sx: 64,  sy: 0   },  // ASPHALT
  2:  { sx: 64,  sy: 64  },  // INTERSECTION
  3:  { sx: 128, sy: 0   },  // SIDEWALK
  4:  { sx: 192, sy: 0   },  // GRASS
  5:  { sx: 128, sy: 64  },  // DIRT
  6:  { sx: 192, sy: 64  },  // PARKING
  7:  { sx: 0,   sy: 128 },  // BUILDING
  8:  { sx: 0,   sy: 64  },  // TREE

function loadTileset(onLoaded) {
  tilesetImage = new Image();
  tilesetImage.onload = onLoaded;
  tilesetImage.onerror = () => {
    console.warn('map_tiles.png failed to load — falling back to procedural tiles');
    tilesetImage = buildFallbackTileset();
    onLoaded();
  };
  tilesetImage.src = 'assets/tiles/map_tiles.png';
}

// Fallback: draw tiles procedurally onto an offscreen canvas if the PNG is missing
function buildFallbackTileset() {
  const fb = document.createElement('canvas');
  fb.width = 256; fb.height = 256;
  const c = fb.getContext('2d');
  const S = TILE_SIZE; // 64

  // ── Flat base tiles ─────────────────────────────────────────────
  const flatTiles = [
    [0,   0,   '#0A0A0A'],  // VOID
    [64,  0,   '#2C2C38'],  // ASPHALT
    [128, 0,   '#C4B48C'],  // SIDEWALK
    [192, 0,   '#2E6A20'],  // GRASS
    [64,  64,  '#323244'],  // INTERSECTION
    [128, 64,  '#7A5A18'],  // DIRT
    [192, 64,  '#383848'],  // PARKING
    [64,  128, '#909080'],  // CURB
  ];
  for (const [x, y, color] of flatTiles) {
    c.fillStyle = color;
    c.fillRect(x, y, S, S);
  }

  // ── GRASS — subtle variation ────────────────────────────────────
  c.fillStyle = '#2E6A20';
  c.fillRect(192, 0, S, S);
  c.fillStyle = '#266018';
  for (let i = 0; i < 12; i++) {
    const gx = 192 + (i * 17) % S;
    const gy = 0   + (i * 11) % S;
    c.fillRect(gx, gy, 3, 5);
  }

  // ── TREE tile ───────────────────────────────────────────────────
  c.fillStyle = '#1A3A10';
  c.fillRect(0, 64, S, S);
  // Canopy
  c.fillStyle = '#225A14';
  c.beginPath();
  c.arc(0 + 32, 64 + 30, 22, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#2A7018';
  c.beginPath();
  c.arc(0 + 28, 64 + 26, 14, 0, Math.PI * 2);
  c.fill();
  // Trunk
  c.fillStyle = '#5A3A18';
  c.fillRect(0 + 29, 64 + 46, 6, 14);

  // ── PARKING tile — flat base only; stall lines are drawn as a world-space overlay ──
  c.fillStyle = '#26263A';
  c.fillRect(192, 64, S, S);

  // ── BUILDING tile ───────────────────────────────────────────────
  const bx = 0, by = 128;
  // Wall
  c.fillStyle = '#6A5C50';
  c.fillRect(bx, by, S, S);
  // Brick pattern
  c.fillStyle = '#5A4C40';
  for (let row = 0; row < 8; row++) {
    const offset = (row % 2) * 8;
    for (let col = 0; col < 5; col++) {
      c.fillRect(bx + offset + col * 16, by + row * 8, 14, 7);
    }
  }
  // Roof edge (dark top stripe)
  c.fillStyle = '#3A2E26';
  c.fillRect(bx, by, S, 5);
  // Windows — 3 columns × 3 rows
  const winColors = ['#8AAAC8', '#6A8AAA', '#AACCEE'];
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      const wx = bx + 7 + col * 18;
      const wy = by + 10 + row * 17;
      // Window frame
      c.fillStyle = '#3A3028';
      c.fillRect(wx - 1, wy - 1, 12, 10);
      // Window glass
      c.fillStyle = winColors[(row + col) % winColors.length];
      c.fillRect(wx, wy, 10, 8);
      // Window reflection glint
      c.fillStyle = 'rgba(255,255,255,0.4)';
      c.fillRect(wx + 1, wy + 1, 3, 2);
    }
  }
  // Side shadow
  c.fillStyle = 'rgba(0,0,0,0.18)';
  c.fillRect(bx + S - 5, by, 5, S);
  c.fillRect(bx, by + S - 5, S, 5);

  return fb;
}

function getTileFriction(tileId) {
  return TILE_FRICTION[tileId] ?? CONFIG.offTrackFriction;
}

function getTileAt(worldX, worldY) {
  if (!MAP) return T.VOID;
  const tx = Math.floor(worldX / TILE_SIZE);
  const ty = Math.floor(worldY / TILE_SIZE);
  if (tx < 0 || tx >= MAP.width || ty < 0 || ty >= MAP.height) return T.VOID;
  return MAP.tiles[ty * MAP.width + tx];
}

function isTileCollidable(worldX, worldY) {
  if (!MAP) return true;
  const tx = Math.floor(worldX / TILE_SIZE);
  const ty = Math.floor(worldY / TILE_SIZE);
  if (tx < 0 || tx >= MAP.width || ty < 0 || ty >= MAP.height) return true;
  return MAP.collision[ty * MAP.width + tx] === true;
}

// [CAR]
// ============================================================
const car = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  heading: 0,          // radians, 0 = east (+x)
  speed: 0,
  steerAngle: 0,       // front wheel angle (player input)
  yawRate: 0,          // angular velocity (rad/frame) — drives heading
  drifting: false,
  currentGripRear: CONFIG.gripRear,
  slipAngle: 0,
};

function angleDiff(a, b) {
  let d = a - b;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Rear grip lookup.
// In this physics model, grip is the fraction of lateral velocity preserved per frame.
// Higher grip → velocity lags behind heading more → larger steady-state slip angle.
// Three zones:
//   Normal cornering: gripRear (0.84) → steady-state slip ~0.20 rad at full lock+speed
//   Drift zone:       lerps toward gripDrift (0.90) → deeper slide, sustains drift
//   Handbrake:        gripHandbrake (0.92) → aggressive slide entry
function computeRearGrip(absSlipAngle, handbrake) {
  if (handbrake) return CONFIG.handbrakeGrip;
  if (absSlipAngle <= CONFIG.driftThreshold) return CONFIG.gripRear;
  // Once drifting, slide deepens slightly over the next 0.5 rad of slip
  const t = Math.min(1.0, (absSlipAngle - CONFIG.driftThreshold) / 0.5);
  return lerp(CONFIG.gripRear, CONFIG.gripDrift, t);
}

function updateCar(input) {
  const throttle  = input.up   ? 1 : (input.down  ? -1 : 0);
  const steerDir  = input.left ? -1 : (input.right ?  1 : 0);
  const handbrake = input.handbrake;

  // ── Speed ─────────────────────────────────────────────────────
  const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
  car.speed = speed;
  // Normalized speed [0,1] — steering and yaw scale with this
  const speedNorm = Math.min(1.0, speed / CONFIG.maxSpeed);

  // ── Front wheel angle (player input) ─────────────────────────
  car.steerAngle += steerDir * CONFIG.steerSpeed;
  car.steerAngle *= CONFIG.steerReturn;
  car.steerAngle  = Math.max(-CONFIG.maxSteer, Math.min(CONFIG.maxSteer, car.steerAngle));

  // ── Heading & right vectors ───────────────────────────────────
  const hx = Math.cos(car.heading);
  const hy = Math.sin(car.heading);
  const rx = -hy;
  const ry =  hx;

  // ── Decompose velocity into forward + lateral ─────────────────
  let fwd = car.vx * hx + car.vy * hy;
  let lat = car.vx * rx + car.vy * ry;

  // ── Slip angle (before heading update) ───────────────────────
  // Angle between velocity direction and car heading.
  // Positive = rear sliding in +right direction of car (left turn oversteer).
  // Negative = rear sliding in -right direction (right turn oversteer).
  const velDir = Math.atan2(car.vy, car.vx);
  const rawSlip = speed > 0.4 ? angleDiff(velDir, car.heading) : 0;
  car.slipAngle = rawSlip;

  // ── Rear grip (slip-angle dependent) ─────────────────────────
  const absSlip = Math.abs(rawSlip);
  const grip    = computeRearGrip(absSlip, handbrake);
  car.currentGripRear = grip;

  // ── Apply lateral grip to velocity ───────────────────────────
  lat *= grip;

  // ── Throttle / brake ──────────────────────────────────────────
  if (throttle > 0) {
    fwd += CONFIG.torque;
    fwd  = Math.min(fwd, CONFIG.maxSpeed);
  } else if (throttle < 0) {
    fwd -= CONFIG.brakeForce;
    fwd  = Math.max(fwd, -CONFIG.reverseMaxSpeed);
  } else {
    fwd *= 0.99;
  }

  // ── Reconstruct velocity from forward + damped lateral ────────
  car.vx = fwd * hx + lat * rx;
  car.vy = fwd * hy + lat * ry;

  // ── Yaw rate physics ──────────────────────────────────────────
  // Steering defines a TARGET yaw rate (how fast the car wants to rotate).
  // yawRate lerps toward the target each frame — gives rotational inertia.
  // When steering is released, target = 0 and yawRate decays naturally.
  // When reversing (fwd < 0), steering direction is reversed for realistic backup handling.
  const steerDirection = fwd < 0 ? -1 : 1;
  const targetYaw = car.steerAngle * speedNorm * CONFIG.steerYawFactor * steerDirection;
  car.yawRate = lerp(car.yawRate, targetYaw, CONFIG.yawLerp);

  // Oversteer: when rear grip is lost, slip angle drives ADDITIONAL yaw.
  // This is additive — at full slip with no countersteer, it accumulates into a spinout.
  // Countersteer (opposite stick) shrinks steerAngle → shrinks targetYaw → yawRate reverses → catches spin.
  // Sign: -rawSlip so that a right-turn slide (rawSlip < 0) adds CW rotation (positive yaw).
  const overSteerYaw = -rawSlip * (1.0 - grip) * CONFIG.oversteerFactor;
  car.yawRate += overSteerYaw;

  car.heading += car.yawRate;

  // ── Surface friction ──────────────────────────────────────────
  const tileId  = getTileAt(car.x, car.y);
  const tileFric = getTileFriction(tileId);
  car.vx *= tileFric;
  car.vy *= tileFric;

  // ── Integrate position with axis-separated collision ──────────
  const nextX = car.x + car.vx;
  const nextY = car.y + car.vy;
  const colX  = isTileCollidable(nextX, car.y);
  const colY  = isTileCollidable(car.x, nextY);

  if (!colX) car.x = nextX;
  else { car.vx *= -0.25; car.yawRate *= 0.5; }

  if (!colY) car.y = nextY;
  else { car.vy *= -0.25; car.yawRate *= 0.5; }

  // ── Drift state ───────────────────────────────────────────────
  car.drifting = absSlip > CONFIG.driftThreshold;

  STATE.slipAngle = car.slipAngle;
  STATE.drifting  = car.drifting;
}

const INPUT = { up: false, down: false, left: false, right: false, handbrake: false };

window.addEventListener('keydown', e => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    INPUT.up        = true; break;
    case 'KeyS': case 'ArrowDown':  INPUT.down      = true; break;
    case 'KeyA': case 'ArrowLeft':  INPUT.left      = true; break;
    case 'KeyD': case 'ArrowRight': INPUT.right     = true; break;
    case 'Space':
      if (!gameStarted) {
        helpModalOpen = false;
        gameStarted = true;
        document.getElementById('bgm').play().catch(() => {});
        e.preventDefault();
        break;
      }
      INPUT.handbrake = true;
      e.preventDefault(); break;
    case 'KeyH':
      if (!gameStarted) { helpModalOpen = !helpModalOpen; e.preventDefault(); }
      break;
    case 'Escape':
      if (!gameStarted && helpModalOpen) { helpModalOpen = false; e.preventDefault(); }
      break;
    case 'KeyP':
      sessionStorage.setItem('minigameReturn', JSON.stringify({ x: car.x, y: car.y, heading: car.heading }));
      window.location.href = 'Maverick-Mini-Golf/dist/index.html'; break;
  }
});

window.addEventListener('keyup', e => {
  switch (e.code) {
    case 'KeyW': case 'ArrowUp':    INPUT.up        = false; break;
    case 'KeyS': case 'ArrowDown':  INPUT.down      = false; break;
    case 'KeyA': case 'ArrowLeft':  INPUT.left      = false; break;
    case 'KeyD': case 'ArrowRight': INPUT.right     = false; break;
    case 'Space':                   INPUT.handbrake = false; break;
  }
});

// ============================================================
// [SCORING]
// ============================================================
function updateScoring() {
  const wasDrifting = STATE.wasDrifting;

  if (STATE.drifting && car.speed > 0 && car.vx * Math.cos(car.heading) + car.vy * Math.sin(car.heading) > 0) {
    // Drift started this frame (only forward, not reverse)
    if (!wasDrifting) {
      if (STATE.comboTimer < CONFIG.comboWindow) {
        STATE.combo = Math.min(STATE.combo + 1, CONFIG.maxCombo);
      } else {
        STATE.combo = 1;
      }
      STATE.comboTimer = 0;
    }
    const pts = CONFIG.scorePerFrame + (Math.abs(STATE.slipAngle) * CONFIG.angleMultiplier);
    STATE.score += pts * STATE.combo;
    STATE.comboTimer = 0;
  } else {
    if (wasDrifting) {
      // Drift just ended — start combo timer
    }
    STATE.comboTimer++;
    if (STATE.comboTimer > CONFIG.comboWindow) {
      // Don't reset combo until next drift starts
    }
  }

  STATE.wasDrifting = STATE.drifting;
}

let canvas, ctx;
let tireCanvas, tireCtx;
let camera = { x: 0, y: 0 };
let minimapCanvas = null;

const MM_W = 175, MM_H = 125; // minimap pixel dimensions (1.25px per tile)

function buildMinimapCanvas() {
  minimapCanvas = document.createElement('canvas');
  minimapCanvas.width  = MM_W;
  minimapCanvas.height = MM_H;
  const mc = minimapCanvas.getContext('2d');
  if (!MAP) return;

  const scaleX = MM_W / MAP.width;
  const scaleY = MM_H / MAP.height;

  const TILE_COLOR = {
    [T.VOID]:         '#080808',
    [T.ASPHALT]:      '#50506A',
    [T.INTERSECTION]: '#50506A',
    [T.SIDEWALK]:     '#998877',
    [T.GRASS]:        '#2A5C1C',
    [T.DIRT]:         '#6A4A14',
    [T.PARKING]:      '#2C2C3C',
    [T.BUILDING]:     '#7A5A3A',
    [T.TREE]:         '#1A3A10',
    [T.CURB]:         '#707060',
  };

  for (let ty = 0; ty < MAP.height; ty++) {
    for (let tx = 0; tx < MAP.width; tx++) {
      const tileId = MAP.tiles[ty * MAP.width + tx];
      mc.fillStyle = TILE_COLOR[tileId] ?? '#2A5C1C';
      mc.fillRect(tx * scaleX, ty * scaleY, Math.ceil(scaleX), Math.ceil(scaleY));
    }
  }
}

const MAX_TIRE_MARKS = 3000;
let tireMarks = []; // [{x,y}]

function drawTileGrid() {
  if (!MAP || !tilesetImage) return;

  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;

  const startTX = Math.floor((camera.x - halfW) / TILE_SIZE) - 1;
  const startTY = Math.floor((camera.y - halfH) / TILE_SIZE) - 1;
  const endTX   = startTX + Math.ceil(canvas.width  / TILE_SIZE) + 3;
  const endTY   = startTY + Math.ceil(canvas.height / TILE_SIZE) + 3;

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      let tileId = T.VOID;
      if (tx >= 0 && tx < MAP.width && ty >= 0 && ty < MAP.height) {
        tileId = MAP.tiles[ty * MAP.width + tx];
      }
      const tm = TILEMAP[tileId] || TILEMAP[0];
      const screenX = tx * TILE_SIZE - camera.x + halfW;
      const screenY = ty * TILE_SIZE - camera.y + halfH;

      ctx.drawImage(
        tilesetImage,
        tm.sx, tm.sy, TILE_SIZE, TILE_SIZE,
        screenX, screenY, TILE_SIZE, TILE_SIZE
      );
    }
  }
}

function drawRoadMarkings() {
  if (!MAP) return;

  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;
  const startTX = Math.floor((camera.x - halfW) / TILE_SIZE) - 1;
  const startTY = Math.floor((camera.y - halfH) / TILE_SIZE) - 1;
  const endTX   = startTX + Math.ceil(canvas.width  / TILE_SIZE) + 3;
  const endTY   = startTY + Math.ceil(canvas.height / TILE_SIZE) + 3;

  ctx.fillStyle = '#FFDD00';
  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      if (tx < 0 || tx >= MAP.width || ty < 0 || ty >= MAP.height) continue;
      const mark = MAP.markings[ty * MAP.width + tx];
      if (!mark) continue;
      if (MAP.tiles[ty * MAP.width + tx] === T.VOID) continue;
      if ((mark & 3) === 3) continue; // both H and V bits set = intersection, skip

      const screenX = tx * TILE_SIZE - camera.x + halfW;
      const screenY = ty * TILE_SIZE - camera.y + halfH;
      const half = TILE_SIZE / 2;

      if (mark & 2) {
        // Vertical road — dash runs top-to-bottom, 8px gap at each tile edge
        ctx.fillRect(screenX + half - 2, screenY + 8, 4, 48);
      } else {
        // Horizontal road (bit 1 or legacy true) — dash runs left-to-right
        ctx.fillRect(screenX + 8, screenY + half - 2, 48, 4);
      }
    }
  }
}

function updateSoccerBall() {
  if (CURRENT_MAP_NAME !== 'UNO Campus') return;

  const TS = TILE_SIZE;
  const R  = soccerBall.radius;

  // Field wall boundaries (in world pixels, matching drawSoccerField)
  const fx1 = SOCCER_FIELD.fx1 * TS;
  const fy1 = SOCCER_FIELD.fy1 * TS;
  const fx2 = SOCCER_FIELD.fx2 * TS;
  const fy2 = SOCCER_FIELD.fy2 * TS;

  // ── Car → ball collision ─────────────────────────────────
  // Treat car as a circle (radius 22px) for simplicity
  const CAR_R  = 22;
  const dx     = soccerBall.x - car.x;
  const dy     = soccerBall.y - car.y;
  const distSq = dx * dx + dy * dy;
  const minD   = CAR_R + R;

  if (distSq < minD * minD && distSq > 0) {
    const dist = Math.sqrt(distSq);
    const nx   = dx / dist;
    const ny   = dy / dist;

    // Impulse based on car speed; preserve a bit of car lateral velocity
    const carSpeed = Math.sqrt(car.vx * car.vx + car.vy * car.vy);
    const impulse  = Math.max(carSpeed * 1.1, 2);
    soccerBall.vx  = nx * impulse + car.vx * 0.25;
    soccerBall.vy  = ny * impulse + car.vy * 0.25;

    // Push ball out of overlap
    soccerBall.x = car.x + nx * (minD + 1);
    soccerBall.y = car.y + ny * (minD + 1);
  }

  // ── Physics ──────────────────────────────────────────────
  soccerBall.vx *= 0.97;
  soccerBall.vy *= 0.97;
  soccerBall.x  += soccerBall.vx;
  soccerBall.y  += soccerBall.vy;

  // ── Boundary & goal collision ────────────────────────────
  // Goal mouth: 4 tiles wide, 1 tile deep (matching drawSoccerField)
  const fcx     = (fx1 + fx2) / 2;
  const gHalfW  = 2 * TS;        // half of 4-tile goal width
  const goalD   = TS;             // 1 tile deep
  const gX1     = fcx - gHalfW;  // left post world-x
  const gX2     = fcx + gHalfW;  // right post world-x
  const topBack = fy1 - goalD;   // back of top goal
  const botBack = fy2 + goalD;   // back of bottom goal

  // Side walls — always solid
  if (soccerBall.x - R < fx1) { soccerBall.x = fx1 + R; soccerBall.vx =  Math.abs(soccerBall.vx) * 0.55; }
  if (soccerBall.x + R > fx2) { soccerBall.x = fx2 - R; soccerBall.vx = -Math.abs(soccerBall.vx) * 0.55; }

  // Top edge: open in the goal mouth, solid elsewhere
  if (soccerBall.y - R < fy1) {
    const inMouth = soccerBall.x > gX1 && soccerBall.x < gX2;
    if (!inMouth) {
      soccerBall.y = fy1 + R; soccerBall.vy = Math.abs(soccerBall.vy) * 0.55;
    } else {
      // Inside top goal — bounce off posts and back net
      if (soccerBall.x - R < gX1) { soccerBall.x = gX1 + R; soccerBall.vx =  Math.abs(soccerBall.vx) * 0.55; }
      if (soccerBall.x + R > gX2) { soccerBall.x = gX2 - R; soccerBall.vx = -Math.abs(soccerBall.vx) * 0.55; }
      if (soccerBall.y - R < topBack) { soccerBall.y = topBack + R; soccerBall.vy = Math.abs(soccerBall.vy) * 0.55; }
    }
  }

  // Bottom edge: open in the goal mouth, solid elsewhere
  if (soccerBall.y + R > fy2) {
    const inMouth = soccerBall.x > gX1 && soccerBall.x < gX2;
    if (!inMouth) {
      soccerBall.y = fy2 - R; soccerBall.vy = -Math.abs(soccerBall.vy) * 0.55;
    } else {
      // Inside bottom goal — bounce off posts and back net
      if (soccerBall.x - R < gX1) { soccerBall.x = gX1 + R; soccerBall.vx =  Math.abs(soccerBall.vx) * 0.55; }
      if (soccerBall.x + R > gX2) { soccerBall.x = gX2 - R; soccerBall.vx = -Math.abs(soccerBall.vx) * 0.55; }
      if (soccerBall.y + R > botBack) { soccerBall.y = botBack - R; soccerBall.vy = -Math.abs(soccerBall.vy) * 0.55; }
    }
  }
}

function drawSoccerBall() {
  if (CURRENT_MAP_NAME !== 'UNO Campus') return;

  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;
  const sx = soccerBall.x - camera.x + halfW;
  const sy = soccerBall.y - camera.y + halfH;
  const R  = soccerBall.radius;

  if (sx < -R * 3 || sx > canvas.width  + R * 3 ||
      sy < -R * 3 || sy > canvas.height + R * 3) return;

  ctx.save();

  // White ball body
  ctx.beginPath();
  ctx.arc(sx, sy, R, 0, Math.PI * 2);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Classic black pentagon patches (5 arms + center spot)
  ctx.fillStyle   = '#1A1A1A';
  ctx.strokeStyle = '#1A1A1A';
  ctx.lineWidth   = 1;

  // Center patch
  ctx.beginPath();
  ctx.arc(sx, sy, R * 0.22, 0, Math.PI * 2);
  ctx.fill();

  // Five outer patches connected by stitching lines
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
    const px = sx + Math.cos(angle) * R * 0.58;
    const py = sy + Math.sin(angle) * R * 0.58;

    ctx.beginPath();
    ctx.arc(px, py, R * 0.18, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(angle) * R * 0.22, sy + Math.sin(angle) * R * 0.22);
    ctx.lineTo(px, py);
    ctx.stroke();
  }

  ctx.restore();
}

function drawSoccerField() {
  if (!MAP || CURRENT_MAP_NAME !== 'UNO Campus') return;

  const halfW = canvas.width / 2;
  const halfH = canvas.height / 2;
  const TS = TILE_SIZE;

  // Field boundary in world pixels — open grass between buildings
  // Safe bounds: x=93 (east of H&K parking), x=108 (west of east building),
  //              y=44 (south of upper H-road sidewalk at y=43), y=61 (clear of buildings)
  const fx1 = 94 * TS;   // left edge   (1-tile buffer from H&K parking)
  const fy1 = 45 * TS;   // top edge    (2-tile buffer from sidewalk at y=43)
  const fx2 = 108 * TS;  // right edge  (east building starts at x=109)
  const fy2 = 61 * TS;   // bottom edge (clear of all buildings)
  const fw  = fx2 - fx1;
  const fh  = fy2 - fy1;
  const fcx = (fx1 + fx2) / 2;
  const fcy = (fy1 + fy2) / 2;

  // World → screen
  const sx = wx => wx - camera.x + halfW;
  const sy = wy => wy - camera.y + halfH;

  ctx.save();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.80)';
  ctx.fillStyle   = 'rgba(255, 255, 255, 0.80)';
  ctx.lineWidth   = 3;
  ctx.lineJoin    = 'round';

  // Outer boundary
  ctx.strokeRect(sx(fx1), sy(fy1), fw, fh);

  // Center line (horizontal, dividing field top/bottom)
  ctx.beginPath();
  ctx.moveTo(sx(fx1), sy(fcy));
  ctx.lineTo(sx(fx2), sy(fcy));
  ctx.stroke();

  // Center circle (~2.5 tiles radius)
  ctx.beginPath();
  ctx.arc(sx(fcx), sy(fcy), 2.5 * TS, 0, Math.PI * 2);
  ctx.stroke();

  // Center spot
  ctx.beginPath();
  ctx.arc(sx(fcx), sy(fcy), 5, 0, Math.PI * 2);
  ctx.fill();

  // Goal areas (6-tile wide, 2-tile deep boxes at each end)
  const gaW = 6 * TS;
  const gaD = 2 * TS;
  const gaX1 = fcx - gaW / 2;
  ctx.strokeRect(sx(gaX1), sy(fy1),       gaW,  gaD);  // top goal area
  ctx.strokeRect(sx(gaX1), sy(fy2 - gaD), gaW,  gaD);  // bottom goal area

  // Goals (4-tile wide, 1-tile deep, drawn outside the boundary)
  const goalW = 4 * TS;
  const goalD = TS;
  const gX1 = fcx - goalW / 2;
  const gX2 = fcx + goalW / 2;

  // Top goal
  ctx.beginPath();
  ctx.moveTo(sx(gX1), sy(fy1));
  ctx.lineTo(sx(gX1), sy(fy1 - goalD));
  ctx.lineTo(sx(gX2), sy(fy1 - goalD));
  ctx.lineTo(sx(gX2), sy(fy1));
  ctx.stroke();

  // Bottom goal
  ctx.beginPath();
  ctx.moveTo(sx(gX1), sy(fy2));
  ctx.lineTo(sx(gX1), sy(fy2 + goalD));
  ctx.lineTo(sx(gX2), sy(fy2 + goalD));
  ctx.lineTo(sx(gX2), sy(fy2));
  ctx.stroke();

  ctx.restore();
}

function drawTireMarks() {
  if (tireMarks.length === 0) return;
  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;
  ctx.fillStyle = '#181818';
  for (const m of tireMarks) {
    const sx = m.x - camera.x + halfW;
    const sy = m.y - camera.y + halfH;
    if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) continue;
    ctx.fillRect(sx - 1, sy - 1, 3, 3);
  }
}

function addTireMark(wx, wy) {
  tireMarks.push({ x: wx, y: wy });
  if (tireMarks.length > MAX_TIRE_MARKS) tireMarks.shift();
}

function updateTireMarks() {
  if (!car.drifting) return;
  // Suppress skid marks when reversing — slip angle is always huge going backwards
  const fwd = car.vx * Math.cos(car.heading) + car.vy * Math.sin(car.heading);
  if (fwd <= 0) return;

  const cos = Math.cos(car.heading);
  const sin = Math.sin(car.heading);
  const rcos = Math.cos(car.heading + Math.PI / 2);
  const rsin = Math.sin(car.heading + Math.PI / 2);
  const BACK  = 14;
  const SIDE  = 9;

  // Rear-left
  addTireMark(
    car.x + rcos * SIDE  - cos * BACK,
    car.y + rsin * SIDE  - sin * BACK
  );
  // Rear-right
  addTireMark(
    car.x - rcos * SIDE  - cos * BACK,
    car.y - rsin * SIDE  - sin * BACK
  );
}

// ── Car sprite ──────────────────────────────────────────────
// Drawn on a 12×20 virtual grid scaled to 36×60px, centered at origin
const CAR_PALETTE_NORMAL = {
  body:   '#CC2222',
  window: '#FF8888',
  wheel:  '#111111',
  trim:   '#FFFFFF',
  light:  '#FF4444',
};
const CAR_PALETTE_DRIFT = {
  body:   '#FF4422',
  window: '#FFAA88',
  wheel:  '#111111',
  trim:   '#FFFF00',
  light:  '#FFAA00',
};

function drawCar() {
  const pal = CAR_PALETTE_NORMAL;
  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;
  const sx = car.x - camera.x + halfW;
  const sy = car.y - camera.y + halfH;

  ctx.save();
  ctx.translate(sx, sy);
  // +PI/2 aligns the sprite (front = local -y) to the physics (heading=0 → east/+x)
  ctx.rotate(car.heading + Math.PI / 2);

  const S = 3; // scale factor: 1 virtual unit = 3px
  const W = 12 * S; // 36px
  const H = 20 * S; // 60px

  // Body
  ctx.fillStyle = pal.body;
  ctx.fillRect(-W / 2, -H / 2, W, H);

  // Windshield (front)
  ctx.fillStyle = pal.window;
  ctx.fillRect(-W / 2 + S * 1, -H / 2 + S * 2, W - S * 2, S * 4);

  // Rear window
  ctx.fillStyle = pal.window;
  ctx.fillRect(-W / 2 + S * 2, H / 2 - S * 6, W - S * 4, S * 3);

  // Trim stripe
  ctx.fillStyle = pal.trim;
  ctx.fillRect(-W / 2, -S, W, S);

  // Front wheels
  ctx.fillStyle = pal.wheel;
  ctx.fillRect(-W / 2 - S, -H / 2 + S * 3, S * 2, S * 4);
  ctx.fillRect( W / 2 - S, -H / 2 + S * 3, S * 2, S * 4);

  // Rear wheels
  ctx.fillRect(-W / 2 - S, H / 2 - S * 7, S * 2, S * 4);
  ctx.fillRect( W / 2 - S, H / 2 - S * 7, S * 2, S * 4);

  // Tail lights
  ctx.fillStyle = pal.light;
  ctx.fillRect(-W / 2,         H / 2 - S * 2, S * 3, S * 2);
  ctx.fillRect( W / 2 - S * 3, H / 2 - S * 2, S * 3, S * 2);

  ctx.restore();
}

function drawParkingLotStalls() {
  if (!MAP || !MAP.parkingLots || !MAP.parkingLots.length) return;
  const halfW = canvas.width  / 2;
  const halfH = canvas.height / 2;

  // Stall dimensions (world pixels)
  const STALL_W = TILE_SIZE;       // 64px — stall width  (car is 36px, fits)
  const STALL_D = TILE_SIZE * 1.5; // 96px — stall depth  (car is 60px, fits)
  const LANE_W  = TILE_SIZE;       // 64px — driving lane between opposing rows
  const T       = 2;               // line thickness

  ctx.fillStyle = 'rgba(255,255,255,0.45)';

  for (const lot of MAP.parkingLots) {
    const lx = Math.round(lot.x - camera.x + halfW);
    const ly = Math.round(lot.y - camera.y + halfH);
    const lw = lot.w;
    const lh = lot.h;

    // Skip lots entirely off-screen
    if (lx + lw < 0 || lx > canvas.width || ly + lh < 0 || ly > canvas.height) continue;

    // Clip to this lot's bounds so lines never spill outside
    ctx.save();
    ctx.beginPath();
    ctx.rect(lx, ly, lw, lh);
    ctx.clip();

    // Each row-group = top stalls (back at top, open at bottom) + lane + bottom stalls (back at bottom, open at top)
    let ry = 0;
    while (ry < lh) {
      const topBackY = Math.round(ly + ry);
      const laneY    = Math.round(ly + ry + STALL_D);

      // ── Top stall row: back line + dividers pointing down (open toward lane) ──
      ctx.fillRect(lx, topBackY, lw, T);                        // back line
      for (let sx = 0; sx <= lw; sx += STALL_W)
        ctx.fillRect(lx + sx - 1, topBackY, T, Math.round(STALL_D)); // dividers

      if (ry + STALL_D >= lh) break;

      // ── Bottom stall row: back line + dividers pointing up (open toward lane) ──
      if (ry + STALL_D + LANE_W < lh) {
        const actualBotD = Math.min(Math.round(STALL_D), lh - ry - Math.round(STALL_D) - Math.round(LANE_W));
        if (actualBotD > 0) {
          const botStartY = Math.round(laneY + LANE_W);
          ctx.fillRect(lx, botStartY + actualBotD - T, lw, T);   // back line at bottom
          for (let sx = 0; sx <= lw; sx += STALL_W)
            ctx.fillRect(lx + sx - 1, botStartY, T, actualBotD); // dividers
        }
      }

      ry += STALL_D * 2 + LANE_W;
      if (ry >= lh) break;
    }

    ctx.restore();
  }
}

function render() {
  ctx.fillStyle = '#0A0A0A';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Update camera (smooth follow)
  camera.x = lerp(camera.x, car.x, 0.12);
  camera.y = lerp(camera.y, car.y, 0.12);

  // 1. Ground / tile grid
  drawTileGrid();

  // 2. Parking lot stall lines (world-space overlay)
  drawParkingLotStalls();

  // 2b. Soccer field markings — Caniglia Field
  drawSoccerField();
  drawSoccerBall();

  // 3. Tire marks (persistent)
  drawTireMarks();

  // 3. Road markings
  drawRoadMarkings();

  // 4. Car
  drawCar();

  // 5. Donut smoke (world-space, above car)
  drawSmoke();

  // 6. HUD
  drawHUD();
}

// ============================================================
// [HUD]
// ============================================================
function drawHUD() {
  const speedKmh = Math.round(Math.sqrt(car.vx * car.vx + car.vy * car.vy) * 18);
  const scoreDisplay = Math.floor(STATE.score);

  ctx.save();

  // ── Minimap (top-left) ──────────────────────────────────────────
  const MM_PAD = 12;
  const MM_BX = MM_PAD, MM_BY = MM_PAD;

  // Panel background
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(MM_BX - 4, MM_BY - 4, MM_W + 8, MM_H + 8 + 18);

  // Static map image
  if (minimapCanvas) {
    ctx.drawImage(minimapCanvas, MM_BX, MM_BY, MM_W, MM_H);
  }

  // Car dot
  if (MAP) {
    const scaleX = MM_W / MAP.width;
    const scaleY = MM_H / MAP.height;
    const dotX = MM_BX + (car.x / TILE_SIZE) * scaleX;
    const dotY = MM_BY + (car.y / TILE_SIZE) * scaleY;
    ctx.fillStyle = '#FFDD00';
    ctx.beginPath();
    ctx.arc(dotX, dotY, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Minimap border
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.strokeRect(MM_BX, MM_BY, MM_W, MM_H);

  // Map name label below minimap
  if (CURRENT_MAP_NAME) {
    ctx.fillStyle = '#888888';
    ctx.font = '10px monospace';
    ctx.fillText(CURRENT_MAP_NAME.toUpperCase(), MM_BX + 2, MM_BY + MM_H + 13);
  }

  // ── Score + Speed panel (top-right) ────────────────────────────
  const PANEL_W = 192, PANEL_H = STATE.combo > 1 ? 114 : 94;
  const PX = canvas.width - PANEL_W - 12;
  const PY = 12;

  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(PX, PY, PANEL_W, PANEL_H);

  ctx.fillStyle = '#888888';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('SCORE', PX + 12, PY + 20);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(scoreDisplay.toLocaleString(), PX + 12, PY + 50);

  if (STATE.combo > 1) {
    ctx.fillStyle = '#FFDD00';
    ctx.font = 'bold 16px monospace';
    ctx.fillText(`x${STATE.combo} COMBO`, PX + 12, PY + 72);
  }

  const speedY = STATE.combo > 1 ? PY + 90 : PY + 70;
  ctx.fillStyle = '#666666';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('SPEED', PX + 12, speedY);
  ctx.fillStyle = '#CCCCCC';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(`${speedKmh} km/h`, PX + 12, speedY + 22);

  // ── DRIFT flash (center, only when drifting forward) ───────────
  const fwd = car.vx * Math.cos(car.heading) + car.vy * Math.sin(car.heading);
  if (STATE.drifting && car.speed > 0 && fwd > 0) {
    const alpha = (STATE.frame % 16 < 8) ? 1.0 : 0.5;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#FF6600';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DRIFT!', canvas.width / 2, canvas.height / 2 - 60);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // ── Building proximity label ────────────────────────────────────
  if (STATE.nearbyBuildingAlpha > 0 && STATE.nearbyBuilding) {
    ctx.globalAlpha = STATE.nearbyBuildingAlpha;
    ctx.font = 'bold 16px monospace';
    const tw = ctx.measureText(STATE.nearbyBuilding).width;
    const lx = canvas.width / 2;
    // Shift up when a minigame prompt is also visible so both can be seen
    const ly = (STATE.nearHK || STATE.nearThompson) ? canvas.height - 116 : canvas.height - 52;
    ctx.fillStyle = 'rgba(0,0,20,0.82)';
    ctx.fillRect(lx - tw / 2 - 14, ly - 20, tw + 28, 28);
    ctx.fillStyle = '#E8D080';
    ctx.textAlign = 'center';
    ctx.fillText(STATE.nearbyBuilding, lx, ly);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // ── Thompson Alumni Center — mini-golf prompt ──────────────────
  if (STATE.nearThompson) {
    const promptText = '[E]  Maverick Mini Golf';
    ctx.font = 'bold 15px monospace';
    const pw = ctx.measureText(promptText).width;
    const px2 = canvas.width / 2;
    const py2 = canvas.height - 80;
    ctx.fillStyle = 'rgba(0,0,20,0.85)';
    ctx.fillRect(px2 - pw / 2 - 16, py2 - 22, pw + 32, 32);
    ctx.strokeStyle = '#FFDD00';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px2 - pw / 2 - 16, py2 - 22, pw + 32, 32);
    ctx.fillStyle = '#FFDD00';
    ctx.textAlign = 'center';
    ctx.fillText(promptText, px2, py2);
    ctx.textAlign = 'left';
  }

  // ── H&K / Wellness Center — climb game prompt ─────────────────
  if (STATE.nearHK) {
    const promptText = '[E]  Maverick Climb';
    ctx.font = 'bold 15px monospace';
    const pw = ctx.measureText(promptText).width;
    const px2 = canvas.width / 2;
    const py2 = canvas.height - 80;
    ctx.fillStyle = 'rgba(0,0,20,0.85)';
    ctx.fillRect(px2 - pw / 2 - 16, py2 - 22, pw + 32, 32);
    ctx.strokeStyle = '#FFDD00';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(px2 - pw / 2 - 16, py2 - 22, pw + 32, 32);
    ctx.fillStyle = '#FFDD00';
    ctx.textAlign = 'center';
    ctx.fillText(promptText, px2, py2);
    ctx.textAlign = 'left';
  }

  // ── Controls hint (bottom) ─────────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, canvas.height - 30, canvas.width, 30);
  ctx.fillStyle = '#666666';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('W/A/S/D or Arrow Keys — SPACE: Handbrake — M: Switch Map — P: Mini-Golf', canvas.width / 2, canvas.height - 10);
  ctx.textAlign = 'left';

  ctx.restore();
}

// ============================================================
// [BUILDING LABELS]
// ============================================================
function updateNearbyBuilding() {
  if (CURRENT_MAP_NAME !== 'UNO Campus') {
    STATE.nearbyBuildingAlpha = Math.max(0, STATE.nearbyBuildingAlpha - 0.06);
    if (STATE.nearbyBuildingAlpha <= 0) STATE.nearbyBuilding = null;
    return;
  }
  const carTX = car.x / TILE_SIZE;
  const carTY = car.y / TILE_SIZE;
  const RADIUS_SQ = 10 * 10;
  let found = null, bestDist = Infinity;
  for (const b of UNO_CAMPUS_BUILDINGS) {
    const dx = carTX - b.cx, dy = carTY - b.cy;
    const d = dx * dx + dy * dy;
    if (d < RADIUS_SQ && d < bestDist) { bestDist = d; found = b.name; }
  }
  if (found) {
    STATE.nearbyBuilding = found;
    STATE.nearbyBuildingAlpha = Math.min(1, STATE.nearbyBuildingAlpha + 0.06);
  } else {
    STATE.nearbyBuildingAlpha = Math.max(0, STATE.nearbyBuildingAlpha - 0.06);
    if (STATE.nearbyBuildingAlpha <= 0) STATE.nearbyBuilding = null;
  }

  // Thompson Alumni Center proximity — enables E-key mini-golf nav
  const THOMPSON_CX = 38, THOMPSON_CY = 13, THOMPSON_R = 7;
  const tdx = carTX - THOMPSON_CX, tdy = carTY - THOMPSON_CY;
  STATE.nearThompson = (CURRENT_MAP_NAME === 'UNO Campus') &&
                       (tdx * tdx + tdy * tdy < THOMPSON_R * THOMPSON_R);

  // H&K / Wellness Center proximity — enables E-key climb game nav
  // Building is L-shaped: vertical arm x=61–72 y=44–72, foot x=73–92 y=62–72
  // Use a padded AABB so the player can trigger from anywhere near the building
  const HK_PAD = 6;
  STATE.nearHK = (CURRENT_MAP_NAME === 'UNO Campus') &&
                 (carTX >= 61 - HK_PAD && carTX <= 92 + HK_PAD &&
                  carTY >= 44 - HK_PAD && carTY <= 72 + HK_PAD);

  // Force the building label to show H&K whenever the AABB is active,
  // overriding the small-radius circle check above
  if (STATE.nearHK) {
    STATE.nearbyBuilding = 'H&K / Wellness Center';
    STATE.nearbyBuildingAlpha = 1;
  }
}

// ============================================================
// [START SCREEN]
// ============================================================
let gameStarted    = false;
let startScreenImg = null;
let helpModalOpen  = false;

function drawStartScreen() {
  // Fill with black to create letterbox/pillarbox bars
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Fit image inside canvas while preserving aspect ratio
  const imgW = startScreenImg.naturalWidth  || startScreenImg.width;
  const imgH = startScreenImg.naturalHeight || startScreenImg.height;
  const scale = Math.min(canvas.width / imgW, canvas.height / imgH);
  const drawW = imgW * scale;
  const drawH = imgH * scale;
  const drawX = (canvas.width  - drawW) / 2;
  const drawY = (canvas.height - drawH) / 2;

  ctx.drawImage(startScreenImg, drawX, drawY, drawW, drawH);

  // prompt label — positioned relative to the drawn image
  const labelText = 'press space to begin  |  H for help';
  const fontSize  = Math.max(16, Math.floor(drawH * 0.032));
  ctx.font        = `${fontSize}px sans-serif`;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';

  const x = drawX + drawW / 2;
  const y = drawY + drawH * 0.88;

  // subtle dark backing
  const tw = ctx.measureText(labelText).width;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(x - tw / 2 - 12, y - fontSize * 0.7, tw + 24, fontSize * 1.4);

  ctx.fillStyle = '#cccccc';
  ctx.fillText(labelText, x, y);
}

function drawHelpModal() {
  const PW  = Math.min(700, canvas.width  - 40);
  const PH  = Math.min(540, canvas.height - 40);
  const PX  = (canvas.width  - PW) / 2;
  const PY  = (canvas.height - PH) / 2;
  const PAD = 28;

  // dim backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // panel
  ctx.fillStyle = '#0d0d18';
  ctx.fillRect(PX, PY, PW, PH);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(PX, PY, PW, PH);

  ctx.save();
  ctx.textBaseline = 'top';

  // ── Title ────────────────────────────────────────────────
  ctx.fillStyle = '#FFDD00';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ELMWOOD DRIFT', PX + PW / 2, PY + PAD);

  ctx.textAlign = 'left';

  // Column split: left half = controls, right half = scoring
  const col1     = PX + PAD;
  const col2     = PX + Math.floor(PW / 2) + 10;
  const KEY_W    = 80;   // fixed width reserved for key label
  const ROW_H    = 24;   // line height for control rows
  const SEC_GAP  = 10;   // gap between heading and first row
  const LABEL_H  = 14;   // monospace heading font size

  function sectionHeading(text, x, y) {
    ctx.fillStyle = '#666666';
    ctx.font = `bold ${LABEL_H}px monospace`;
    ctx.fillText(text.toUpperCase(), x, y);
  }

  function ctrlRow(key, desc, x, y) {
    ctx.fillStyle = '#FFDD00';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(key, x, y);
    ctx.fillStyle = '#cccccc';
    ctx.font = '13px monospace';
    ctx.fillText(desc, x + KEY_W, y);
  }

  // ── Controls (left column) ───────────────────────────────
  let cy = PY + PAD + 36;
  sectionHeading('Controls', col1, cy);
  cy += SEC_GAP + LABEL_H;

  const controls = [
    ['W / ↑',   'Accelerate'],
    ['S / ↓',   'Brake / Reverse'],
    ['A / ←',   'Steer left'],
    ['D / →',   'Steer right'],
    ['SPACE',   'Handbrake'],
    ['M',       'Switch map'],
    ['H',       'Toggle help'],
  ];
  for (const [key, desc] of controls) {
    ctrlRow(key, desc, col1, cy);
    cy += ROW_H;
  }

  // ── Scoring (right column) ───────────────────────────────
  let cy2 = PY + PAD + 36;
  sectionHeading('Scoring', col2, cy2);
  cy2 += SEC_GAP + LABEL_H;

  const NOTE_LINE_H = 17;
  const notes = [
    ['Drift',  ['Slide your rear wheels to earn', 'points every frame.']],
    ['Angle',  ['Bigger slip angle = faster point gain.']],
    ['Combo',  ['Chain drifts within 90 frames', 'for a multiplier (up to x8).']],
    ['Speed',  ['Must be moving forward while', 'drifting to score.']],
  ];

  for (const [label, lines] of notes) {
    ctx.fillStyle = '#FFDD00';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(label, col2, cy2);
    cy2 += NOTE_LINE_H;
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '12px monospace';
    for (const l of lines) {
      ctx.fillText(l, col2, cy2);
      cy2 += NOTE_LINE_H;
    }
    cy2 += 6; // gap between scoring entries
  }

  // ── Locations (full width, below both columns) ───────────
  const locY = Math.max(cy, cy2) + 16;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(PX + PAD, locY - 4, PW - PAD * 2, 1); // divider line

  sectionHeading('Locations  (UNO Campus)', col1, locY + 8);

  const LOC_LINE_H = 19;
  let ly = locY + 8 + SEC_GAP + LABEL_H;
  ctx.font = '13px monospace';

  const locations = [
    { label: 'Thompson Alumni Center', action: 'press E  →  Maverick Mini Golf' },
    { label: 'H&K / Wellness Center',  action: 'press E  →  Maverick Climb'    },
  ];
  for (const loc of locations) {
    ctx.fillStyle = '#FFDD00';
    ctx.font = 'bold 13px monospace';
    ctx.fillText('Drive near  ' + loc.label, col1, ly);
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '13px monospace';
    ctx.fillText(loc.action, col2, ly);
    ly += LOC_LINE_H;
  }

  // ── Dismiss hint ─────────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('press H or ESC to close', PX + PW / 2, PY + PH - 18);

  ctx.restore();
}

// ============================================================
// [LOOP]
// ============================================================
function gameLoop() {
  if (!gameStarted) {
    drawStartScreen();
    if (helpModalOpen) drawHelpModal();
    requestAnimationFrame(gameLoop);
    return;
  }
  STATE.frame++;
  updateCar(INPUT);
  updateScoring();
  updateTireMarks();
  updateSoccerBall();
  updateSmoke();
  updateNearbyBuilding();
  render();
  requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function switchMap() {
  mapIndex = (mapIndex + 1) % MAP_BUILDERS.length;
  const info = MAP_BUILDERS[mapIndex];
  MAP = info.build();
  buildMinimapCanvas();
  CURRENT_MAP_NAME = info.name;
  document.title = `Elmwood Drift — ${CURRENT_MAP_NAME}`;

  // reset car in a sensible location for the new map
  // UNO Campus — spawn on top road near west side, heading east
  car.x = (12 + 0.5) * TILE_SIZE;
  car.y = (5  + 0.5) * TILE_SIZE;
  car.heading = 0;
  STATE.score = 0;
  STATE.combo = 1;
  STATE.comboTimer = 0;
  STATE.drifting = false;
  STATE.slipAngle = 0;
  STATE.wasDrifting = false;

  camera.x = car.x;
  camera.y = car.y;

  resetSoccerBall();
}

function init() {
  canvas = document.getElementById('game');
  ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // prepare map builders list
  MAP_BUILDERS = [
    { name: 'UNO Campus', build: buildUNOCampusMap },
  ];
  mapIndex = 0;
  CURRENT_MAP_NAME = MAP_BUILDERS[0].name;
  document.title = `Elmwood Drift — ${CURRENT_MAP_NAME}`;
  MAP = MAP_BUILDERS[0].build();
  buildMinimapCanvas();

  // Restore position if returning from a minigame, otherwise use default spawn
  const _mgReturn = sessionStorage.getItem('minigameReturn');
  if (_mgReturn) {
    sessionStorage.removeItem('minigameReturn');
    const _saved = JSON.parse(_mgReturn);
    car.x = _saved.x;
    car.y = _saved.y;
    car.heading = _saved.heading;
    gameStarted = true;
  } else {
    // initial car spawn (UNO campus — top road, heading east)
    car.x = (12 + 0.5) * TILE_SIZE;
    car.y = (5  + 0.5) * TILE_SIZE;
    car.heading = 0; // facing east
  }

  camera.x = car.x;
  camera.y = car.y;

  resetSoccerBall();

  // mini-golf nav with 'E'
  window.addEventListener('keydown', e => {
    if (e.key === 'e' || e.key === 'E') {
      if (STATE.nearThompson) {
        sessionStorage.setItem('minigameReturn', JSON.stringify({ x: car.x, y: car.y, heading: car.heading }));
        window.location.href = 'Maverick-Mini-Golf/dist/index.html';
      } else if (STATE.nearHK) {
        sessionStorage.setItem('minigameReturn', JSON.stringify({ x: car.x, y: car.y, heading: car.heading }));
        window.location.href = 'maverick_climb/index.html';
      }
    }
  });

  // BGM volume (play triggered by Space on start screen)
  document.getElementById('bgm').volume = 0.5;

  // load tileset + start screen image, then kick off the loop
  loadTileset(() => {
    startScreenImg = new Image();
    startScreenImg.onload  = () => requestAnimationFrame(gameLoop);
    startScreenImg.onerror = () => { gameStarted = true; requestAnimationFrame(gameLoop); };
    startScreenImg.src = 'assets/start-screen.png';
  });
}

init();
</script>
