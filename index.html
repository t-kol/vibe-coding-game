<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏎️ Top-Down Drifting Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a1a;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    
    canvas {
      display: block;
      background: #000;
      border: 3px solid #fff;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    // ============================================================
    // [CONFIG] — All tunable physics constants
    // ============================================================
    const CONFIG = {
      // Engine
      torque:           0.4,     // Acceleration force
      brakeForce:       0.6,     // Braking deceleration
      maxSpeed:         8.0,     // Max velocity magnitude (px/frame)
      reverseMaxSpeed:  3.0,

      // Steering
      steerSpeed:       0.045,   // Radians per frame at full lock
      steerReturn:      0.85,    // How fast steering centers (0–1)

      // Grip & Drift
      gripFront:        0.88,    // Front lateral grip (0 = ice, 1 = glue)
      gripRear:         0.82,    // Rear lateral grip
      handbrakeGrip:    0.30,    // Rear grip when handbrake is held
      driftThreshold:   0.35,    // Slip angle (rad) that triggers drift state
      tractionRegain:   0.04,    // How fast grip returns after drift

      // Off-track penalty
      offTrackFriction: 0.92,    // Velocity multiplier per frame off-track
      onTrackFriction:  0.995,   // Velocity multiplier per frame on-track

      // Scoring
      scorePerFrame:    0.5,     // Base points per frame while drifting
      angleMultiplier:  80,      // Slip angle contribution to score
      comboWindow:      90,      // Frames before combo resets after drift ends
      maxCombo:         8,       // Combo cap
    };

    // ============================================================
    // [STATE] — Global game state
    // ============================================================
    const state = {
      frameCount: 0,
      score: 0,
      combo: 0,
      comboTimer: 0,
      driftStarted: false,
      driftFrame: 0,
    };

    // ============================================================
    // [MAP] — Track geometry & rendering data
    // ============================================================
    const MAP = {
      width:  1400,          // Canvas width
      height: 900,           // Canvas height
      background: '#2d4a1e', // Grass color
      trackColor: '#4a4a4a', // Asphalt color
      lineColor:  '#ffffff', // Track markings

      // Phase 1: No boundaries (blank canvas)
      outerBoundary: [],
      innerBoundary: [],
      zones: [],
      
      // Spawn point
      spawn: { x: 700, y: 450, angle: 0 },
      stops: [],
    };

    // ============================================================
    // [CAR] — Car object and physics
    // ============================================================
    const car = {
      x: MAP.spawn.x,
      y: MAP.spawn.y,
      heading: MAP.spawn.angle,  // Direction car is pointing (radians)
      vx: 0,                     // Velocity X
      vy: 0,                     // Velocity Y
      speed: 0,                  // Magnitude of velocity
      steer: 0,                  // Current steering angle (-1 to 1)
      drifting: false,
      driftTractionLoss: 0,      // How much traction is lost (0-1)
      wheelmarkPositions: [],    // Trail of tire marks

      width: 12 * 3,    // 12px wide, scaled 3x = 36px
      height: 20 * 3,   // 20px tall, scaled 3x = 60px

      update() {
        // 1. Read input (handled in input section)
        
        // 2. Apply torque to speed along heading
        if (input.accelerate) {
          this.speed += CONFIG.torque;
        }
        if (input.brake) {
          this.speed -= CONFIG.brakeForce;
        }
        
        // Cap speed
        const maxSpd = this.speed > 0 ? CONFIG.maxSpeed : CONFIG.reverseMaxSpeed;
        this.speed = Math.max(-maxSpd, Math.min(maxSpd, this.speed));

        // 3. Rotate heading by steer input (scaled by speed)
        const steerAmount = (input.left ? -1 : 0) + (input.right ? 1 : 0);
        const steerDelta = steerAmount * CONFIG.steerSpeed * Math.abs(this.speed) / CONFIG.maxSpeed;
        this.steer += steerDelta;
        this.steer *= CONFIG.steerReturn;
        this.heading += this.steer;

        // 4. Calculate forward and lateral components
        const speed = this.speed;
        
        // Forward velocity (along heading)
        const forwardVx = Math.cos(this.heading) * speed;
        const forwardVy = Math.sin(this.heading) * speed;
        
        // Current velocity magnitude
        const velMag = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        
        // Lateral component (perpendicular to heading)
        const lateralAxis = this.heading + Math.PI / 2;
        let lateralMag = 0;
        if (velMag > 0.1) {
          const velAngle = Math.atan2(this.vy, this.vx);
          lateralMag = Math.cos(velAngle - (this.heading + Math.PI / 2));
          lateralMag *= velMag;
        }

        // 5. Apply grip to lateral component
        let grip = CONFIG.gripRear;
        if (input.handbrake) {
          grip = CONFIG.handbrakeGrip;
        }
        
        lateralMag *= grip;

        // Regain traction after drift
        this.driftTractionLoss = Math.max(0, this.driftTractionLoss - CONFIG.tractionRegain);

        // 6. Reconstruct velocity
        const lateralVx = Math.cos(lateralAxis) * lateralMag;
        const lateralVy = Math.sin(lateralAxis) * lateralMag;
        
        this.vx = forwardVx + lateralVx;
        this.vy = forwardVy + lateralVy;

        // 7. Apply on/off-track friction
        const friction = CONFIG.onTrackFriction;
        this.vx *= friction;
        this.vy *= friction;

        // 8. Integrate position
        this.x += this.vx;
        this.y += this.vy;

        // Wrap at canvas edges
        if (this.x < 0) this.x += MAP.width;
        if (this.x > MAP.width) this.x -= MAP.width;
        if (this.y < 0) this.y += MAP.height;
        if (this.y > MAP.height) this.y -= MAP.height;

        // 9. Calculate slip angle
        const velAngle = Math.atan2(this.vy, this.vx);
        let slipAngle = Math.abs(velAngle - this.heading);
        
        // Normalize slip angle to 0 - PI
        while (slipAngle > Math.PI) slipAngle -= Math.PI;
        
        // 10. Detect drift
        const wasDrifting = this.drifting;
        this.drifting = slipAngle > CONFIG.driftThreshold && this.speed > 2;
        
        if (this.drifting) {
          this.driftTractionLoss = Math.min(1, this.driftTractionLoss + 0.1);
          state.driftFrame++;
        } else {
          if (wasDrifting) {
            state.comboTimer = CONFIG.comboWindow;
            state.combo = Math.min(state.combo + 1, CONFIG.maxCombo);
          }
          state.driftFrame = 0;
        }

        if (state.comboTimer > 0) {
          state.comboTimer--;
        } else {
          state.combo = 0;
        }
      }
    };

    // ============================================================
    // [INPUT] — Keyboard handler
    // ============================================================
    const input = {
      accelerate: false,
      brake: false,
      left: false,
      right: false,
      handbrake: false,
    };

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'w') input.accelerate = true;
      if (key === 's') input.brake = true;
      if (key === 'a') input.left = true;
      if (key === 'd') input.right = true;
      if (key === ' ') { input.handbrake = true; e.preventDefault(); }
    });

    window.addEventListener('keyup', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'w') input.accelerate = false;
      if (key === 's') input.brake = false;
      if (key === 'a') input.left = false;
      if (key === 'd') input.right = false;
      if (key === ' ') { input.handbrake = false; e.preventDefault(); }
    });

    // ============================================================
    // [SCORING] — Drift detection & scoring
    // ============================================================
    function updateScoring() {
      if (car.drifting) {
        const velAngle = Math.atan2(car.vy, car.vx);
        let slipAngle = Math.abs(velAngle - car.heading);
        while (slipAngle > Math.PI) slipAngle -= Math.PI;
        
        const scoreInc = CONFIG.scorePerFrame + slipAngle * CONFIG.angleMultiplier;
        state.score += scoreInc * (1 + state.combo * 0.1);
      }
    }

    // ============================================================
    // [RENDERER] — Canvas drawing
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    canvas.width = MAP.width;
    canvas.height = MAP.height;

    function drawCarSprite(x, y, heading, isCrashing) {
      // Save context
      ctx.save();
      
      // Translate to car position and rotate
      ctx.translate(x, y);
      ctx.rotate(heading);
      
      // Draw pixelated car (12x20 base, scaled 3x = 36x60)
      const scale = 3;
      const w = 12 * scale;
      const h = 20 * scale;
      
      // Choose color based on drift state
      let bodyColor = '#ff4444';
      let wheelColor = '#333333';
      
      if (car.drifting) {
        // Flash when drifting
        bodyColor = Math.floor(state.frameCount / 3) % 2 === 0 ? '#ffff00' : '#ff4444';
      }
      
      // Main body (rectangle)
      ctx.fillStyle = bodyColor;
      ctx.fillRect(-w / 2, -h / 2, w, h * 0.6);
      
      // Hood (triangle pointing up)
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.moveTo(-w / 2, -h / 2);
      ctx.lineTo(w / 2, -h / 2);
      ctx.lineTo(0, -h / 2 - h * 0.15);
      ctx.fill();
      
      // Rear bumper
      ctx.fillStyle = '#990000';
      ctx.fillRect(-w / 2, h / 2 - h * 0.1, w, h * 0.1);
      
      // Windows
      ctx.fillStyle = '#4499ff';
      ctx.fillRect(-w / 3, -h / 6, w * 0.66, h * 0.2);
      
      // Wheels
      ctx.fillStyle = wheelColor;
      ctx.fillRect(-w / 3, -h / 2 - h * 0.05, w * 0.22, h * 0.05);
      ctx.fillRect(w / 3 - w * 0.22, -h / 2 - h * 0.05, w * 0.22, h * 0.05);
      ctx.fillRect(-w / 3, h / 2, w * 0.22, h * 0.05);
      ctx.fillRect(w / 3 - w * 0.22, h / 2, w * 0.22, h * 0.05);
      
      ctx.restore();
    }

    function render() {
      // Clear canvas
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, MAP.width, MAP.height);
      
      // Draw grid background (optional, for visual reference)
      ctx.strokeStyle = '#333333';
      ctx.lineWidth = 1;
      for (let x = 0; x < MAP.width; x += 100) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, MAP.height);
        ctx.stroke();
      }
      for (let y = 0; y < MAP.height; y += 100) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(MAP.width, y);
        ctx.stroke();
      }
      
      // Draw car
      drawCarSprite(car.x, car.y, car.heading, false);
    }

    // ============================================================
    // [HUD] — Overlay UI
    // ============================================================
    function renderHUD() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, 300, 200);
      
      ctx.fillStyle = '#fff';
      ctx.font = '16px Courier New';
      ctx.textBaseline = 'top';
      
      const speed = Math.sqrt(car.vx * car.vx + car.vy * car.vy).toFixed(1);
      const score = Math.floor(state.score);
      const combo = state.combo;
      const driftStatus = car.drifting ? 'DRIFTING' : 'GROUNDED';
      
      ctx.fillText(`Speed: ${speed}`, 20, 20);
      ctx.fillText(`Score: ${score}`, 20, 50);
      ctx.fillText(`Combo: ${combo}x`, 20, 80);
      ctx.fillText(`Status: ${driftStatus}`, 20, 110);
      ctx.fillText(`Frame: ${state.frameCount}`, 20, 140);
      
      // Instructions
      ctx.font = '12px Courier New';
      ctx.fillText('W/S: Gas/Brake | A/D: Steer', 20, 170);
    }

    // ============================================================
    // [LOOP] — Main game loop
    // ============================================================
    function gameLoop() {
      state.frameCount++;
      
      car.update();
      updateScoring();
      render();
      renderHUD();
      
      requestAnimationFrame(gameLoop);
    }

    // Start game
    gameLoop();
  </script>
</body>
</html>
